<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LinkedIn Profile Optimizer</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 4rem auto; padding: 0 1rem; }
    h1 { margin-bottom: .25rem; }
    p.sub { color: #555; margin-top: 0; }
    form { margin-top: 2rem; padding: 2rem; border: 2px dashed #ccc; border-radius: 12px; }
    button { margin-top: 1rem; padding: .6rem 1.2rem; font-size: 1rem; border: 0; border-radius: 8px; background: #0a66c2; color: #fff; cursor: pointer; }
    .err { color: #b00020; margin-top: 1rem; }
    ol { color: #555; }
  </style>
</head>
<body>
  <h1>LinkedIn Profile Optimizer</h1>
  <p class="sub">Upload your LinkedIn "Save to PDF" export for a best-practices review.</p>
  <ol>
    <li>Open your LinkedIn profile.</li>
    <li>Click <strong>Resources &rarr; Save to PDF</strong>.</li>
    <li>Upload the downloaded file below.</li>
  </ol>
  <form action="/analyze" method="post" enctype="multipart/form-data">
    <input type="file" name="file" accept="application/pdf" required>
    <br>
    <button type="submit">Analyze my profile</button>
  </form>
  {% if error %}<p class="err">{{ error }}</p>{% endif %}
</body>
</html>
